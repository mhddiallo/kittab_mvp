name: kittab
description: Kittab — La marketplace du livre en Afrique
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # HTTP
  dio: ^5.4.0

  # Storage
  shared_preferences: ^2.2.2

  # Images
  cached_network_image: ^3.3.1

  # Fonts
  google_fonts: ^6.2.1

  # Barcode scan
  mobile_scanner: ^4.0.0

  # Camera / Image picker
  image_picker: ^1.0.7

  # Geolocation
  geolocator: ^11.0.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.5
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
