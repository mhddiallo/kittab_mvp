<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kittab – Catalogue (preview filtres)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#C0392B' } } }
    }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .dropdown { display: none; }
    .dropdown.open { display: block; }
    select { -webkit-appearance: none; }
  </style>
</head>
<body class="bg-gray-50">

<!-- Navbar fictive -->
<div class="h-16 bg-white border-b border-gray-200 flex items-center px-6">
  <span class="font-extrabold text-primary text-xl tracking-widest">KITTAB</span>
</div>

<!-- ═══════════════════════════════════════════════
     OPTION A – Barre compacte style marketplace
     ═══════════════════════════════════════════════ -->
<div class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-3 sticky top-0 z-30 shadow-sm">

  <!-- Recherche -->
  <div class="flex items-center gap-2 bg-gray-100 rounded-full px-4 py-2 w-72 shrink-0">
    <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    <input type="text" placeholder="Titre, auteur..." class="bg-transparent text-sm outline-none text-gray-700 w-full placeholder-gray-400" />
  </div>

  <!-- Séparateur vertical -->
  <div class="w-px h-6 bg-gray-200 shrink-0"></div>

  <!-- Pills filtre -->
  <div class="flex items-center gap-2 overflow-x-auto flex-1" style="scrollbar-width:none">

    <!-- Catégories -->
    <div class="relative shrink-0">
      <button onclick="toggle('cat')" class="flex items-center gap-1.5 border border-gray-300 rounded-full px-3.5 py-1.5 text-sm font-medium text-gray-700 bg-white hover:border-gray-500 transition-colors">
        Catégories
        <svg class="w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div id="cat" class="dropdown absolute top-full left-0 mt-2 w-52 bg-white border border-gray-200 rounded-2xl shadow-xl py-1.5 z-50">
        <button class="w-full text-left px-4 py-2 text-sm text-primary font-semibold bg-red-50">Toutes les catégories</button>
        <div class="border-t border-gray-100 my-1"></div>
        <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Littérature africaine</button>
        <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Roman</button>
        <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Développement personnel</button>
        <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Scolaire & Universitaire</button>
        <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Religion & Spiritualité</button>
        <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">Sciences & Technique</button>
      </div>
    </div>

    <!-- Prix -->
    <div class="relative shrink-0">
      <button onclick="toggle('prix')" class="flex items-center gap-1.5 border border-gray-300 rounded-full px-3.5 py-1.5 text-sm font-medium text-gray-700 bg-white hover:border-gray-500 transition-colors">
        Prix
        <svg class="w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div id="prix" class="dropdown absolute top-full left-0 mt-2 w-60 bg-white border border-gray-200 rounded-2xl shadow-xl p-4 z-50">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Fourchette de prix</p>
        <div class="flex items-center gap-2 mb-3">
          <div class="flex-1">
            <label class="text-xs text-gray-500 mb-1 block">Min</label>
            <div class="flex items-center border border-gray-200 rounded-lg overflow-hidden">
              <input type="number" placeholder="0" class="flex-1 px-3 py-2 text-sm outline-none w-full" />
              <span class="px-2 text-xs text-gray-400 bg-gray-50 py-2 border-l border-gray-200">FCFA</span>
            </div>
          </div>
          <span class="text-gray-400 mt-5">—</span>
          <div class="flex-1">
            <label class="text-xs text-gray-500 mb-1 block">Max</label>
            <div class="flex items-center border border-gray-200 rounded-lg overflow-hidden">
              <input type="number" placeholder="∞" class="flex-1 px-3 py-2 text-sm outline-none w-full" />
              <span class="px-2 text-xs text-gray-400 bg-gray-50 py-2 border-l border-gray-200">FCFA</span>
            </div>
          </div>
        </div>
        <div class="space-y-1">
          <button class="w-full text-left px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-gray-50">Moins de 2 000 FCFA</button>
          <button class="w-full text-left px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-gray-50">2 000 – 5 000 FCFA</button>
          <button class="w-full text-left px-3 py-2 rounded-lg text-sm text-primary bg-red-50 font-medium">5 000 – 15 000 FCFA ✓</button>
          <button class="w-full text-left px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-gray-50">Plus de 15 000 FCFA</button>
        </div>
        <button class="w-full mt-3 py-2 rounded-xl bg-primary text-white text-sm font-semibold hover:bg-primary/90">Appliquer</button>
      </div>
    </div>

    <!-- État -->
    <div class="relative shrink-0">
      <button onclick="toggle('etat')" class="flex items-center gap-1.5 border border-gray-300 rounded-full px-3.5 py-1.5 text-sm font-medium text-gray-700 bg-white hover:border-gray-500 transition-colors">
        État
        <svg class="w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div id="etat" class="dropdown absolute top-full left-0 mt-2 w-52 bg-white border border-gray-200 rounded-2xl shadow-xl py-1.5 z-50">
        <button class="w-full text-left px-4 py-2 text-sm text-primary font-semibold bg-red-50">Tous les états</button>
        <div class="border-t border-gray-100 my-1"></div>
        <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">✨ Parfait état</button>
        <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">👍 Très bon état</button>
        <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">📖 État correct</button>
        <button class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50">📝 Dégradé</button>
      </div>
    </div>

    <!-- Localisation -->
    <div class="relative shrink-0">
      <button onclick="toggle('loc')" class="flex items-center gap-1.5 border border-gray-300 rounded-full px-3.5 py-1.5 text-sm font-medium text-gray-700 bg-white hover:border-gray-500 transition-colors">
        <svg class="w-3.5 h-3.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg>
        Localisation
        <svg class="w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
      </button>
      <div id="loc" class="dropdown absolute top-full left-0 mt-2 w-72 bg-white border border-gray-200 rounded-2xl shadow-xl p-4 z-50">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Localisation</p>
        <button class="w-full flex items-center gap-2 px-3 py-2.5 rounded-xl border border-dashed border-gray-300 text-sm text-gray-600 hover:border-primary hover:text-primary hover:bg-red-50 transition-colors mb-3">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/></svg>
          Autour de moi
        </button>
        <input type="text" placeholder="Saisir une ville..." class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm outline-none focus:border-primary" />
        <div class="flex gap-2 mt-3">
          <button class="flex-1 py-2 rounded-xl border border-gray-200 text-sm text-gray-600 hover:bg-gray-50">Effacer</button>
          <button class="flex-1 py-2 rounded-xl bg-primary text-white text-sm font-semibold">Valider</button>
        </div>
      </div>
    </div>

    <!-- Échange -->
    <button class="shrink-0 flex items-center gap-1.5 border border-gray-300 rounded-full px-3.5 py-1.5 text-sm font-medium text-gray-700 bg-white hover:border-gray-500 transition-colors">
      🔄 Échange
    </button>

    <!-- Filtre actif exemple -->
    <div class="shrink-0 flex items-center gap-1.5 border border-primary rounded-full px-3.5 py-1.5 text-sm font-medium text-primary bg-red-50">
      5 000 – 15 000 FCFA
      <button class="text-primary hover:text-primary/70 ml-0.5">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>

  </div>

  <!-- Nombre de résultats -->
  <div class="shrink-0 text-sm text-gray-500 hidden lg:block">
    <span class="font-bold text-gray-900">247</span> livres
  </div>

</div>

<!-- Contenu page -->
<div class="max-w-7xl mx-auto px-6 py-6">
  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-4">
    <!-- Cartes fictives -->
    <div *ngFor="" class="bg-white rounded-2xl border border-gray-200 overflow-hidden hover:shadow-md transition-shadow">
    </div>
  </div>

  <!-- Grille placeholder -->
  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-4">
    <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">
      <div class="h-40 bg-gray-100"></div>
      <div class="p-3">
        <div class="h-3 bg-gray-200 rounded mb-2"></div>
        <div class="h-3 bg-gray-100 rounded w-2/3 mb-2"></div>
        <div class="h-4 bg-primary/20 rounded w-1/2"></div>
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">
      <div class="h-40 bg-gray-100"></div>
      <div class="p-3">
        <div class="h-3 bg-gray-200 rounded mb-2"></div>
        <div class="h-3 bg-gray-100 rounded w-2/3 mb-2"></div>
        <div class="h-4 bg-primary/20 rounded w-1/2"></div>
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">
      <div class="h-40 bg-gray-100"></div>
      <div class="p-3">
        <div class="h-3 bg-gray-200 rounded mb-2"></div>
        <div class="h-3 bg-gray-100 rounded w-2/3 mb-2"></div>
        <div class="h-4 bg-primary/20 rounded w-1/2"></div>
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">
      <div class="h-40 bg-gray-100"></div>
      <div class="p-3">
        <div class="h-3 bg-gray-200 rounded mb-2"></div>
        <div class="h-3 bg-gray-100 rounded w-2/3 mb-2"></div>
        <div class="h-4 bg-primary/20 rounded w-1/2"></div>
      </div>
    </div>
    <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">
      <div class="h-40 bg-gray-100"></div>
      <div class="p-3">
        <div class="h-3 bg-gray-200 rounded mb-2"></div>
        <div class="h-3 bg-gray-100 rounded w-2/3 mb-2"></div>
        <div class="h-4 bg-primary/20 rounded w-1/2"></div>
      </div>
    </div>
  </div>
</div>

<script>
  function toggle(id) {
    document.querySelectorAll('.dropdown').forEach(d => {
      if (d.id !== id) d.classList.remove('open');
    });
    document.getElementById(id).classList.toggle('open');
  }
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.relative')) {
      document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
    }
  });
</script>

</body>
</html>
