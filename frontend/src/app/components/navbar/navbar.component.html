<nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-6 flex items-center justify-between h-16">

    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-1 font-bold text-xl text-gray-900">
      <span class="text-primary text-2xl">📚</span><span>KITTAB</span>
    </a>

    <!-- Nav links desktop -->
    <div class="hidden md:flex items-center gap-7 text-sm font-medium text-gray-600">
      <a routerLink="/" routerLinkActive="text-primary" [routerLinkActiveOptions]="{exact:true}" class="hover:text-primary transition-colors">Accueil</a>
      <a routerLink="/catalogue" routerLinkActive="text-primary" class="hover:text-primary transition-colors">Catalogue</a>
      <a routerLink="/how-it-works" routerLinkActive="text-primary" class="hover:text-primary transition-colors">Comment ça marche</a>
      <a routerLink="/contact" routerLinkActive="text-primary" class="hover:text-primary transition-colors">Contactez-nous</a>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-3">
      <!-- Bouton Publier -->
      <a routerLink="/publish" class="hidden md:flex btn-outline items-center gap-1.5">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Vendre un livre
      </a>

      <!-- Non connecté -->
      <a *ngIf="!auth.isLoggedIn" routerLink="/login" class="btn-primary">Se connecter</a>

      <!-- Connecté -->
      <div *ngIf="auth.isLoggedIn" class="relative group">
        <button class="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 rounded-full px-4 py-2 text-sm font-semibold text-gray-700 transition-colors">
          <span class="w-6 h-6 rounded-full bg-primary text-white flex items-center justify-center text-xs font-bold">
            {{ auth.user?.first_name?.[0]?.toUpperCase() || '?' }}
          </span>
          {{ auth.user?.first_name || 'Mon compte' }}
          <svg class="w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </button>
        <!-- Dropdown -->
        <div class="absolute right-0 top-full mt-2 w-44 bg-white border border-gray-100 rounded-xl shadow-lg py-1 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all">
          <a routerLink="/publish" class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-red-50 hover:text-primary">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Publier une annonce
          </a>
          <a href="#" class="flex items-center gap-2 px-4 py-2.5 text-sm text-gray-700 hover:bg-red-50 hover:text-primary">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            Mon profil
          </a>
          <div class="border-t border-gray-100 my-1"></div>
          <button (click)="logout()" class="w-full flex items-center gap-2 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
            Se déconnecter
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
