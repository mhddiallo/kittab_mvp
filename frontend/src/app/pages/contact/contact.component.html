<app-navbar />

<div class="min-h-screen bg-white">
  <div class="max-w-6xl mx-auto px-4 py-16">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">

      <!-- Illustration gauche -->
      <div class="text-center lg:text-left">
        <div class="inline-block bg-primary text-white rounded-2xl px-6 py-4 mb-8 shadow-lg">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-8 h-8 bg-white/20 rounded-full flex items-center justify-center">
              <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <span class="font-bold text-sm uppercase tracking-wide">Posez-nous une question</span>
          </div>
          <input type="text" placeholder="Ecrire quelque chose..." class="w-full bg-white/10 border border-white/20 rounded-lg px-4 py-2 text-sm text-white placeholder-white/60 focus:outline-none" />
        </div>

        <div class="flex justify-center lg:justify-start gap-8 text-center">
          <div>
            <div class="text-3xl mb-2">📚</div>
            <p class="text-xs text-gray-500">Des milliers de livres</p>
          </div>
          <div class="flex items-end pb-2">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center text-3xl">❓</div>
          </div>
          <div>
            <div class="text-3xl mb-2">👩‍🎓</div>
            <p class="text-xs text-gray-500">Une communauté active</p>
          </div>
        </div>
      </div>

      <!-- Formulaire -->
      <div>
        <div class="flex items-center justify-between mb-2">
          <h1 class="text-3xl font-extrabold text-gray-900">Contactez-nous</h1>
          <div class="flex gap-2">
            <a href="#" class="w-9 h-9 border border-gray-200 rounded-lg flex items-center justify-center hover:border-primary hover:text-primary transition-colors text-gray-400">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            </a>
            <a href="#" class="w-9 h-9 border border-gray-200 rounded-lg flex items-center justify-center hover:border-primary hover:text-primary transition-colors text-gray-400">
              <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            </a>
          </div>
        </div>
        <p class="text-gray-500 text-sm mb-8">Nous aimerions avoir de vos nouvelles. Veuillez remplir ce formulaire.</p>

        <!-- Succès -->
        <div *ngIf="sent" class="bg-green-50 border border-green-200 rounded-xl p-6 text-center">
          <div class="text-4xl mb-3">✅</div>
          <h3 class="font-bold text-green-800 mb-1">Message envoyé !</h3>
          <p class="text-green-600 text-sm">Nous vous répondrons dans les plus brefs délais.</p>
        </div>

        <form *ngIf="!sent" (ngSubmit)="submit()" class="border border-gray-200 rounded-2xl p-6 space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Prénom</label>
              <input [(ngModel)]="firstName" name="firstName" type="text" placeholder="Prénom"
                     class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-primary" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Nom</label>
              <input [(ngModel)]="lastName" name="lastName" type="text" placeholder="Nom"
                     class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-primary" />
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
            <input [(ngModel)]="email" name="email" type="email" placeholder="votre@email.com"
                   class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-primary" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Objet</label>
            <input [(ngModel)]="subject" name="subject" type="text" placeholder="Sujet de votre message"
                   class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-primary" />
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Message</label>
            <textarea [(ngModel)]="message" name="message" rows="4" placeholder="Votre message..."
                      class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-primary resize-none"></textarea>
          </div>

          <div class="flex items-start gap-3">
            <input [(ngModel)]="accepted" name="accepted" type="checkbox" id="policy"
                   class="mt-0.5 w-4 h-4 accent-primary cursor-pointer" />
            <label for="policy" class="text-sm text-gray-600 cursor-pointer">
              Vous acceptez notre <a href="#" class="text-primary hover:underline">politique de confidentialité</a>.
            </label>
          </div>

          <button type="submit" [disabled]="!firstName || !email || !message || !accepted || loading"
                  class="w-full flex items-center justify-center gap-2 py-3 rounded-xl font-semibold text-sm transition-all"
                  [ngClass]="firstName && email && message && accepted ? 'bg-primary text-white hover:bg-red-800' : 'bg-gray-100 text-gray-400 cursor-not-allowed'">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
            {{ loading ? 'Envoi...' : 'Envoyer le message' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<app-footer />
