<app-navbar />

<div class="max-w-2xl mx-auto px-4 py-10">
  <div class="flex items-center gap-3 mb-8">
    <a routerLink="/my-listings" class="text-gray-400 hover:text-gray-600 transition-colors">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <h1 class="text-2xl font-extrabold text-gray-900">Modifier l'annonce</h1>
  </div>

  <div *ngIf="loading" class="flex justify-center py-20">
    <div class="w-10 h-10 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
  </div>

  <div *ngIf="error && loading" class="card p-8 text-center text-red-600">{{ error }}</div>

  <form *ngIf="!loading" (ngSubmit)="submit()" class="space-y-6">

    <div *ngIf="success" class="bg-green-50 border border-green-200 text-green-700 rounded-xl p-4 text-sm font-medium">
      ✅ {{ success }}
    </div>
    <div *ngIf="error && !loading" class="bg-red-50 border border-red-200 text-red-600 rounded-xl p-4 text-sm">
      {{ error }}
    </div>

    <!-- Titre & Auteur -->
    <div class="card p-6 space-y-4">
      <h2 class="font-bold text-gray-800">Informations du livre</h2>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Titre du livre</label>
        <input [(ngModel)]="title" name="title" type="text" required
               class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Auteur</label>
        <input [(ngModel)]="author" name="author" type="text" required
               class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Type</label>
          <select [(ngModel)]="bookType" name="bookType"
                  class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary bg-white">
            <option *ngFor="let t of bookTypes" [value]="t.value">{{ t.label }}</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Catégorie</label>
          <select [(ngModel)]="categoryId" name="categoryId"
                  class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary bg-white">
            <option [ngValue]="null">-- Choisir --</option>
            <option *ngFor="let c of categories" [ngValue]="c.id">{{ c.name }}</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Description (optionnelle)</label>
        <textarea [(ngModel)]="description" name="description" rows="3"
                  class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary resize-none"></textarea>
      </div>
    </div>

    <!-- État -->
    <div class="card p-6">
      <h2 class="font-bold text-gray-800 mb-4">État du livre</h2>
      <div class="grid grid-cols-2 gap-3">
        <label *ngFor="let c of conditions"
               class="flex items-start gap-3 p-4 rounded-xl border-2 cursor-pointer transition-all"
               [class]="condition === c.value ? c.cls : 'border-gray-100 hover:border-gray-200'">
          <input type="radio" [(ngModel)]="condition" name="condition" [value]="c.value" class="hidden" />
          <span class="text-xl mt-0.5">{{ c.emoji }}</span>
          <div>
            <p class="font-semibold text-sm" [class]="condition === c.value ? c.textCls : 'text-gray-700'">{{ c.label }}</p>
            <p class="text-xs text-gray-400">{{ c.desc }}</p>
          </div>
        </label>
      </div>
    </div>

    <!-- Prix & Disponibilité -->
    <div class="card p-6 space-y-4">
      <h2 class="font-bold text-gray-800">Prix et disponibilité</h2>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Prix (FCFA)</label>
        <input [(ngModel)]="price" name="price" type="number" min="0" required
               class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary" />
      </div>
      <label class="flex items-center gap-3 cursor-pointer">
        <div class="relative">
          <input type="checkbox" [(ngModel)]="isAvailable" name="isAvailable" class="sr-only peer" />
          <div class="w-11 h-6 bg-gray-200 peer-checked:bg-primary rounded-full transition-colors"></div>
          <div class="absolute left-0.5 top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform peer-checked:translate-x-5"></div>
        </div>
        <span class="text-sm font-medium text-gray-700">Disponible à la vente</span>
      </label>
    </div>

    <button type="submit" [disabled]="!isValid || submitting"
            class="w-full btn-primary py-3.5 text-base font-semibold disabled:opacity-50 disabled:cursor-not-allowed">
      {{ submitting ? 'Enregistrement...' : 'Enregistrer les modifications' }}
    </button>
  </form>
</div>

<app-footer />
