<app-navbar />

<div class="max-w-2xl mx-auto px-4 py-10">
  <div class="flex items-center gap-4 mb-8">
    <div class="w-16 h-16 rounded-full bg-primary flex items-center justify-center text-white text-2xl font-extrabold">
      {{ auth.user?.first_name?.[0]?.toUpperCase() || '?' }}
    </div>
    <div>
      <h1 class="text-2xl font-extrabold text-gray-900">Mon profil</h1>
      <p class="text-gray-500 text-sm">{{ phone }}</p>
    </div>
  </div>

  <div class="card p-6 mb-6">
    <h2 class="font-bold text-gray-800 mb-5">Informations personnelles</h2>

    <div *ngIf="success" class="bg-green-50 border border-green-200 rounded-lg px-4 py-3 text-sm text-green-700 mb-4">
      ✅ Profil mis à jour avec succès
    </div>
    <div *ngIf="error" class="bg-red-50 border border-red-200 rounded-lg px-4 py-3 text-sm text-red-700 mb-4">
      {{ error }}
    </div>

    <div class="space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Prénom</label>
          <input [(ngModel)]="firstName" type="text" placeholder="Prénom"
                 class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-primary" />
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Nom</label>
          <input [(ngModel)]="lastName" type="text" placeholder="Nom"
                 class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-primary" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Téléphone</label>
        <ng-container *ngIf="isGoogleUser; else phoneReadonly">
          <input [(ngModel)]="newPhone" type="text" inputmode="tel" placeholder="+224 XXX XXX XXX"
                 class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-primary" />
          <p class="text-xs text-gray-400 mt-1">Ajoutez votre numéro pour être contacté par les acheteurs</p>
        </ng-container>
        <ng-template #phoneReadonly>
          <input [value]="phone" type="text" disabled
                 class="w-full border border-gray-100 rounded-lg px-4 py-2.5 text-sm bg-gray-50 text-gray-400 cursor-not-allowed" />
          <p class="text-xs text-gray-400 mt-1">Le numéro de téléphone ne peut pas être modifié</p>
        </ng-template>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Adresse / Ville</label>
        <input [(ngModel)]="address" type="text" placeholder="Ex: Conakry, Ratoma"
               class="w-full border border-gray-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:border-primary" />
      </div>
    </div>

    <div class="flex gap-3 mt-6">
      <button (click)="save()" [disabled]="loading"
              class="btn-primary flex items-center gap-2 disabled:opacity-60">
        <span *ngIf="loading" class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
        {{ loading ? 'Enregistrement...' : 'Sauvegarder' }}
      </button>
      <a routerLink="/my-listings" class="btn-outline">Mes annonces</a>
    </div>
  </div>
</div>

<app-footer />
